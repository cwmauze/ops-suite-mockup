<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- PWA / iOS Native App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Ops Suite">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Ops Suite - Login</title>
    <script>
        function scaleDevice() {
            const frame = document.querySelector('.device-frame');
            const container = document.getElementById('main-view') || document.body;
            if(frame) {
                if (document.body.classList.contains('native-mode')) {
                    frame.style.transform = 'none';
                    return;
                }
                const scale = Math.min((container.clientWidth * 0.95) / 784, (container.clientHeight * 0.95) / 1173);
                frame.style.transform = `scale(${scale})`;
            }
        }
        window.addEventListener('resize', scaleDevice);
        window.addEventListener('DOMContentLoaded', () => {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            const isMobile = /iPad|iPhone|iPod|Android/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isStandalone || isMobile) {
                document.body.classList.add('native-mode');
            }
            scaleDevice();
        });
    </script>
    <style>
        :root {
            --bg-color: #f4f5f7;
            --text-primary: #333333;
            --text-secondary: #888888;
            --accent-blue: #1877f2;
            --card-bg: #ffffff;
            --input-bg: #f8f9fa;
            --border-color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #333;
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            width: 100vw;
        }

        #main-view {
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100%; 
            position: relative;
        }

        .device-frame {
            width: 744px;
            height: 1133px; 
            background-color: #111;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .device-screen {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- NATIVE APP SIMULATION (IPAD) --- */
        body.native-mode {
            background-color: var(--bg-color);
        }
        body.native-mode .device-frame {
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            padding: 0 !important;
            box-shadow: none !important;
            transform: none !important;
        }
        body.native-mode .device-screen {
            border-radius: 0 !important;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-title {
            font-size: 2.2rem;
            font-weight: 400;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-title span {
            font-weight: 600;
        }

        .logo-subtitle {
            font-size: 0.95rem;
            color: #666;
            margin-top: 5px;
            font-weight: 500;
        }

        .powered-by {
            font-size: 0.85rem;
            color: #666;
            margin-top: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .login-card {
            background: var(--card-bg);
            width: 100%;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #555;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: #999;
            display: flex;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-blue);
        }

        .input-wrapper input::placeholder {
            color: #aaa;
        }

        .eye-icon {
            position: absolute;
            right: 12px;
            color: #999;
            cursor: pointer;
            display: flex;
        }

        .btn-signin {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-signin:hover {
            background-color: #1565c0;
        }

        .btn-signin:active {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="main-view">
        <div class="device-frame">
            <div class="device-screen">
                <div class="login-container">
                    <div class="logo-section">
                        <div class="logo-title">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform: rotate(-15deg);">
                                <path d="M22 2L2 8.66667L11.5833 11.5833L15.3333 22L22 2Z" fill="#eb5757"/>
                            </svg>
                            Ops <span>Suite</span>
                        </div>
                        <div class="logo-subtitle">Formerly Complete Flight</div>
                        <div class="powered-by">
                            Powered by 
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 4L12 20L20 4" stroke="#eb5757" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            vellox group
                        </div>
                    </div>

                    <div class="login-card">
                        <div class="form-group">
                            <label>Organization</label>
                            <div class="input-wrapper">
                                <div class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                                        <path d="M9 22v-4h6v4"></path>
                                        <path d="M8 6h.01"></path>
                                        <path d="M16 6h.01"></path>
                                        <path d="M12 6h.01"></path>
                                        <path d="M12 10h.01"></path>
                                        <path d="M12 14h.01"></path>
                                        <path d="M16 10h.01"></path>
                                        <path d="M16 14h.01"></path>
                                        <path d="M8 10h.01"></path>
                                        <path d="M8 14h.01"></path>
                                    </svg>
                                </div>
                                <input type="text" placeholder="Enter organization">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Username</label>
                            <div class="input-wrapper">
                                <div class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                </div>
                                <input type="text" placeholder="Enter username">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-wrapper">
                                <div class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                    </svg>
                                </div>
                                <input type="password" placeholder="Enter password">
                                <div class="eye-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <button class="btn-signin" onclick="window.location.href='manifest.html'">Sign In</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
