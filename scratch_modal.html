    <!-- Duty In Risk Modal -->
    <div id="duty-in-risk-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px;">
        <div style="background-color: var(--bg-card); width: 100%; max-width: 600px; max-height: 90vh; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15);">
            <!-- Modal Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border-color);">
                <div style="font-size: 16px; font-weight: 700; color: var(--text-main);">Duty-In Risk Assessment (rev 10.3.2024)</div>
                <div style="cursor: pointer; padding: 4px;" onclick="closeDutyInRiskModal()">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted);"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>
            
            <!-- Modal Content -->
            <div style="flex: 1; overflow-y: auto; padding: 16px;">
                <div style="font-size: 12px; font-weight: 700; color: var(--text-main); margin-bottom: 16px; letter-spacing: 0.5px;">HEALTH & WELLNESS - SELECT ALL THAT APPLY.</div>
                
                <div id="duty-in-risk-list" style="display: flex; flex-direction: column;">
                    <!-- Risk items will be generated here -->
                </div>

                <div style="margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 16px;">
                    <label style="font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; display: block;">Pilot Comments</label>
                    <textarea id="duty-in-pilot-comments" placeholder="Enter comments..." style="width: 100%; height: 100px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; background-color: var(--bg-body); box-sizing: border-box;"></textarea>
                </div>

                <div style="margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 16px; display: flex; justify-content: space-between; align-items: center;">
                    <label style="font-size: 14px; color: var(--text-main);">Sign this form</label>
                    <!-- Toggle Switch -->
                    <label style="position: relative; display: inline-block; width: 44px; height: 24px;">
                        <input type="checkbox" id="duty-in-sign-toggle" style="opacity: 0; width: 0; height: 0;">
                        <span class="ios-switch"></span>
                    </label>
                </div>
            </div>

            <!-- Modal Footer -->
            <div style="display: flex; gap: 12px; padding: 16px; border-top: 1px solid var(--border-color); background-color: var(--bg-body);">
                <button onclick="closeDutyInRiskModal()" style="flex: 1; padding: 14px; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--bg-body); font-size: 16px; font-weight: 600; color: var(--text-main); cursor: pointer;">Cancel</button>
                <button onclick="saveDutyInRiskModal()" style="flex: 1; padding: 14px; border-radius: 8px; border: none; background-color: var(--accent-blue); font-size: 16px; font-weight: 600; color: white; cursor: pointer;">Save</button>
            </div>
        </div>
    </div>
